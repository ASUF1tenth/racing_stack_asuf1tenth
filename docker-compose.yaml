x-common-build-settings: &common-build-settings
  context: .
  pull: false

x-user-args: &user-args
  USER: ${USER}
  UID: ${HOST_UID} # user id must be saved to an environment variable, can be done with `export UID=$(id -u)`
  GID: ${HOST_GID} # group id must be saved to an environment variable, can be done with `export GID=$(id -g)`

x-common-settings: &common-settings
  network_mode: host
  ipc: host
  privileged: true
  shm_size: "1gb"
  post_start:
    - command: source /home/${USER}/ws/src/race_stack/.devcontainer/xauth_setup.sh
  command: tail -f /dev/null
  volumes:
    - /dev:/dev
    - $HOME/.Xauthority:/tmp/.Xauthority
    - /tmp/.X11-unix:/tmp/.X11-unix
    - ./:/home/${USER}/ws/src/race_stack:rw
    - ../race_stack_cache/humble/build:/home/${USER}/ws/build:rw
    - ../race_stack_cache/humble/install:/home/${USER}/ws/install:rw
    - ../race_stack_cache/humble/logs:/home/${USER}/ws/logs:rw
    - .vscode:/home/${USER}/ws/.vscode:rw
  environment:
    - DISPLAY=${DISPLAY}
    - XAUTHORITY=/tmp/.Xauthority
    - USER=${USER}
    - USERNAME=${USER}
    - ROS_LOCALHOST_ONLY=0
    - ROS_DOMAIN_ID=42
    - RCUTILS_COLORIZED_OUTPUT=1
    - RMW_IMPLEMENTATION=rmw_zenoh_cpp

services:
  jet:
    build:
      <<: *common-build-settings
      dockerfile: ./devcontainer/Dockerfile
      args:
        <<: *user-args
        IMAGE: dustynv/ros:noetic-ros-base-l4t-r35.2.1
        PLATFORM: jet
    container_name: forzaeth_devcontainer_jet
    image: race_stack:humble_jet
    <<: *common-settings
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  x86:
    build:
      <<: *common-build-settings
      dockerfile: ./devcontainer/Dockerfile
      args:
        <<: *user-args
        IMAGE: ros:humble-ros-base
        PLATFORM: x86
    container_name: forzaeth_devcontainer_x86
    image: race_stack:humble_x86
    <<: *common-settings
  arm:
    build:
      <<: *common-build-settings
      dockerfile: ./devcontainer/Dockerfile
      args:
        <<: *user-args
        IMAGE: ros:humble-ros-base
        PLATFORM: arm
    container_name: forzaeth_devcontainer_arm
    image: race_stack:humble_arm
    <<: *common-settings
